<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nazar Veliasiuk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@font-face {
  font-family: 'MyTypeface';
  src: url('ABCSocialEdu-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'MyTypeface';
  src: url('ABCSocialEdu-Bold.woff2') format('woff2');
  font-weight: bold;
}
@font-face {
  font-family: 'MyTypeface';
  src: url('ABCSocialEdu-Thin.woff2') format('woff2');
  font-weight: thin;
}
@font-face {
  font-family: 'MyTypeface';
  src: url('ABCSocialEdu-Light.woff2') format('woff2');
  font-weight: light;
}

@font-face {
  font-family: 'MyTypeface2';
  src: url('ABCSocialCondensedEdu-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'MyTypeface2';
  src: url('ABCSocialCondensedEdu-Light.woff2') format('woff2');
  font-weight: light;
}
@font-face {
  font-family: 'MyTypeface2';
  src: url('ABCSocialCondensedEdu-Thin.woff2') format('woff2');
  font-weight: thin;
}
@font-face {
  font-family: 'MyTypeface2';
  src: url('ABCSocialCondensedEdu-Bold.woff2') format('woff2');
  font-weight: bold;
}

body {
  font-family: 'MyTypeface';
  font-size: 0.9rem;
  margin: 0;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.02em;
  color: black;
  transition: color 4.8s cubic-bezier(0.25, 1, 0.5, 1);
  overflow-x: hidden;
}

a {
  color: inherit;
  text-decoration: none;
  transition:
    color 4.8s cubic-bezier(0.25, 1, 0.5, 1),
    opacity 0.4s ease;
}

/* TYPOGRAPHY LAYER */

.info-box {
  font-family: 'MyTypeface';
  position: fixed;
  top: 20px;
  left: 20px;
  width: min(300px, 80vw);
  font-size: clamp(0.9rem, 1.6vw, 1.2rem);
  line-height: 1.1;
  z-index: 2;
  text-transform: uppercase;
  transition: opacity 1.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.name {
  font-weight: bold;
  color: #999;
  transition: color 0.3s ease;
}

.name:hover {
  color: black;
}

.info-box a {
  font-weight: bold;
  opacity: 0.25;
}

.info-box a:hover {
  opacity: 1;
}

.bottom-projects {
  font-family: 'MyTypeface';
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: clamp(150px, 18vw, 220px);
  max-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  line-height: 1.1;
  z-index: 2;
  text-transform: uppercase;
  transition: opacity 1.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.bottom-projects a {
  display: block;
  font-size: clamp(0.7rem, 1.2vw, 1.2rem);
  font-weight: bold;
  opacity: 0.25;
  transition: opacity 0.4s ease;
  cursor: pointer;
  white-space: nowrap;
}

.bottom-projects a.active-project {
  opacity: 1;
}

.image-description {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: min(520px, 90vw);
  font-size: clamp(0.65rem, 0.9vw, 0.9rem);
  text-align: center;
  transition: opacity 0.4s ease;
  z-index: 2;
  color: black;
  font-family: 'MyTypeface';
  font-weight: thin;
  line-height: 1.1;
}

/* PICTURE LAYER */

.container-wrapper {
  position: fixed;
  top: 46%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 1200px;
  z-index: 3;
}

.container {
  position: relative;
  width: 100%;
  height: min(65vh, 650px);
}

.thing {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
  pointer-events: none;
}

.thing.active {
  opacity: 1;
  pointer-events: auto;
}

img,
video {
  max-width: 100%;
  max-height: min(65vh, 650px);
  object-fit: contain;
}

/* EMOJI RAIN */

.rainbow-snow-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
}

.rainbow-snow {
  position: absolute;
  top: -140px;
  width: 45px;
  opacity: 1;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translate3d(0, -40px, 0) rotate(0deg); }
  100% { transform: translate3d(0, 130vh, 0) rotate(360deg); }
}

body.intro-active .info-box,
body.intro-active .bottom-projects,
body.intro-active .image-description {
  opacity: 0;
  pointer-events: none;
}

/* MOBILE LAYOUT */

@media (max-width: 700px) {

  .info-box {
    top: 15px;
    left: 15px;
    width: calc(100vw - 30px);
    font-size: clamp(0.8rem, 3.2vw, 1rem);
    line-height: 1.05;
  }

  .container-wrapper {
    top: 40%;
    width: 92vw;
  }

  .container {
    height: 48vh;
  }

  img,
  video {
    max-height: 48vh;
    max-width: 100%;
  }

  .bottom-projects {
    left: 15px;
    bottom: 15px;
    width: calc(100vw - 30px);
    max-width: none;
    gap: 1px;
  }

  .bottom-projects a {
    font-size: clamp(0.65rem, 2.8vw, 0.82rem);
    line-height: 1.05;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .image-description {
    left: 15px;
    bottom: 120px;
    transform: none;
    width: calc(100vw - 30px);
    text-align: left;
    font-size: clamp(0.65rem, 2.6vw, 0.82rem);
    line-height: 1.15;
  }

}

.intro-active,
.intro-active * {
  cursor: pointer !important;
}
</style>
</head>

<body>

<div class="info-box">
  <span class="name">Nazar Veliasiuk</span><br>
  <a href="info.html">about</a>
</div>

<div class="container-wrapper">
  <div class="container" id="stage">

    <!-- Slide 0 -->
    <div class="thing">
      <img src="" alt="" class="nazaris-image">
      <video id="nazarisVideo" loop playsinline style="display:none;">
        <source src="nazaris.mp4" type="video/mp4">
      </video>
    </div>

    <!-- Slides 1–11 -->
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>
    <div class="thing"><img src="" alt=""></div>

    <!-- Slide 12: Banana Cult pt.1 -->
    <div class="thing">
      <img src="" alt="">
      <video id="bananaCultVideo" loop playsinline style="display:none;">
        <source src="bananacult.mp4" type="video/mp4">
      </video>
    </div>

    <!-- Slide 13: Banana Cult pt.2 -->
    <div class="thing"><img src="" alt=""></div>

    <!-- Slide 14: Broken habits -->
    <div class="thing"><img src="" alt=""></div>

  </div>
</div>

<div class="image-description" id="desc"></div>

<div class="bottom-projects">
  <a data-index="0">Nazar is, 2025</a>
  <a data-index="1">My name is Kitty, 2025</a>
  <a data-index="2">OASE 88, 2025</a>
  <a data-index="3">Water Reflection, 2024</a>
  <a data-index="4">Gun/Tongue, 2024</a>
  <a data-index="5">Protest Sign, 2025</a>
  <a data-index="6">Fragments, 2024</a>
  <a data-index="7">CEO, 2024</a>
  <a data-index="8">!?…, 2024</a>
  <a data-index="9">Kimish, 2025</a>
  <a data-index="10">Calendar, 2024</a>
  <a data-index="11">Kitchen pleasures, 2024</a>
  <a data-index="12">Banana Cult pt.1, 2024</a>
  <a data-index="13">Banana Cult pt.2, 2024</a>
  <a data-index="14">Broken habits, 2025</a>
</div>

<div class="rainbow-snow-container" id="rainbowSnow"></div>

<script>
var slides = document.getElementsByClassName("thing");
var desc = document.getElementById("desc");
var projectLinks = document.querySelectorAll(".bottom-projects a");

var nazarisVideo = document.getElementById("nazarisVideo");
var bananaCultVideo = document.getElementById("bananaCultVideo");
var firstSlideImg = slides[0].querySelector("img");
var bananaSlideImg = slides[12].querySelector("img");

var fastSpeed = 1200;
var slowSpeed = 1200;
var currentSpeed = fastSpeed;
var targetSpeed = fastSpeed;
var easing = 0.03;

var isHovering = false;
var isLocked = false;
var lockedIndex = 0;
var currentIndex = 0;

/* SAFE URL */
function safeSrc(path) {
  return encodeURI(path)
    .replace(/\?/g, "%3F")
    .replace(/#/g, "%23");
}

function rangeWebp(prefix, start, end) {
  var arr = [];
  for (var i = start; i <= end; i++) {
    arr.push(prefix + i + ".webp");
  }
  return arr;
}

/* IMAGE SETS */
var projectImagesByIndex = [
  ["./Nazaris.webp"],
  rangeWebp("./mynameiskitty", 1, 5),
  rangeWebp("./oase", 1, 16),
  rangeWebp("./waterreflection", 1, 7),
  rangeWebp("./gun-tongue", 1, 9),
  ["./protestsign.webp"],
  rangeWebp("./fragments", 1, 9),
  rangeWebp("./americantech", 1, 5),
  rangeWebp("./!?...", 1, 15),
  rangeWebp("./Kimish", 1, 14),
  rangeWebp("./calendar", 1, 6),
  rangeWebp("./kitchenpleasures", 1, 7),
  ["./bananacult.webp"],
  rangeWebp("./bananacultimg", 1, 54),
  rangeWebp("./brokenhabits", 1, 20)
];

/* DESCRIPTIONS */
var descriptions = [
  "In my installation, I explore the theme of self-identity and how others’ opinions often shape it. To learn more about myself, I asked my classmates to anonymously share one “positive” and one “negative” thing about me, and I turned their responses into an installation. Through this, I learned that some classmates see me as a stereotypical gay man, that I point out dirt on people’s clothes, that I am a girls’ magnet, etc.",
  "“My name is Kitty” is a series of five photographs documenting a performance in which I present myself as a woman and engage in intimate online conversations with men. For the photos, I built a temporary structure using items from the photo studio, such as tables, chairs, and a stepladder. Screenshots from video chats, printed on A3 paper, were taped to this structure, reflecting the fake, fragile reality created in chat.",
  "A5 size redesign issue of OASE 88. OxyContin, introduced in the 1990s as a low-risk painkiller, hid its potential for addiction and increased the opioid epidemic in the USA, causing more than 650,000 deaths. Profits from the drug were later used by the Sackler family to fund institutions such as the Metropolitan Museum and the Guggenheim. The leporello publication juxtaposes articles from OASE 88 with OxyContin advertisements and images of Sackler-funded institutions.",
  "A series of experiments to explore two worlds existing in water: its natural physical state and the changing reality of reflection that it creates with its surface. Experiments are done both analogue and digital.",
  "A3 type specimen about typography made with “water”. I used two tools to write the words: a water gun and my tongue.",
  "Inspired by the 2022 Chinese White Paper protests, where blank sheets symbolised censorship and suppressed speech. I showed students a photo of me holding a blank A4 sign with no context and asked them what I was protesting. Their answers reflected the current social and political context, revealing how people project meaning onto ambiguous symbols. To capture the final result, students chose the protest sign that struck them the most, and I photographed them together.",
  "A book about human body fragments that are lost or cut from sculptures and drawings. The upside-down-cut-off appearance of the book was created by folding and cutting large sheets of paper into A7 sized signature. The book was created using images from the Rijksmuseum archive.",
  "A series of caricatures of major American tech executives, some of the richest people in the world. Digital mosaic of the logos of the companies they control.<br><br>Elon Musk, the X owner and Tesla and SpaceX CEO.<br>Jeff Bezos, the Amazon founder.<br>Mark Zuckerberg, the Meta CEO.<br>Tim Cook, the CEO of Apple.<br>Bill Gates, co-founder of Microsoft.",
  "A1 poster series about the use of punctuation in comics. Made in collage technique and printed in silkscreen.",
  "The book “kimish” features my selfies, which I copied from Kim Kardashian’s “selfish” photo book. Each photo has a corresponding page number that refers the viewer to the image from Kim’s book. I also included a short essay I wrote as a reflection on how fame, algorithm and social media can affect a person’s identity.",
  "A calendar was made from memories of my childhood. Each day has an individual picture, each month name has an individual design, and each page is silkscreen printed.",
  "Zine reflects on how society stigmatises and taboos topics of nudity, gender, and sexual expression. It explores the paradox of pain and pleasure, control and passion – all told through home kitchen tools reimagined as instruments of transgression. Collages from nude clippings from magazines, highlights of reflective conversations and tactile transparent stickers give the reader a sense of the simultaneous pleasure, embarrassment and possible discomfort we feel during sexual experiences.",
  "Cavendish banana is grown as a sterile clone, making it seedless but highly vulnerable to Panama disease, a threat to its survival. To preserve this fruit for future generations, I created a religion and invented five rituals centred on the banana, which I documented through video and photographs. To emphasise its greater value and delicacy, I covered the fruit in gold.",
  "Cavendish banana is grown as a sterile clone, making it seedless but highly vulnerable to Panama disease, a threat to its survival. To preserve this fruit for future generations, I created a religion and invented five rituals centred on the banana, which I documented through video and photographs. To emphasise its greater value and delicacy, I covered the fruit in gold.",
  "A publication presenting five experiments that challenge behavioural norms. Learned habits and unconscious visual cues strongly affect human actions. By disrupting familiar spatial elements and sensory perceptions, I prompted myself to find new ways to navigate. The experiments take the form of spatial interventions and performances."
];

function showSlide(index) {
  for (var i = 0; i < slides.length; i++) {
    slides[i].classList.remove("active");
  }
  slides[index].classList.add("active");
}

function updateBottomHighlight(index) {
  projectLinks.forEach(function(link) {
    link.classList.remove("active-project");
  });
  projectLinks[index].classList.add("active-project");
}

function clearAllMiniSlides() {
  for (var i = 0; i < slides.length; i++) {
    if (slides[i].miniInterval) {
      clearInterval(slides[i].miniInterval);
    }
    slides[i].miniInterval = null;
  }
}

function stopAllVideos() {
  if (nazarisVideo) {
    nazarisVideo.pause();
    nazarisVideo.currentTime = 0;
    nazarisVideo.style.display = "none";
  }

  if (bananaCultVideo) {
    bananaCultVideo.pause();
    bananaCultVideo.currentTime = 0;
    bananaCultVideo.style.display = "none";
  }

  if (firstSlideImg) {
    firstSlideImg.style.display = "";
  }

  if (bananaSlideImg) {
    bananaSlideImg.style.display = "";
  }
}

function playNazarisVideo() {
  if (!nazarisVideo || !slides[0]) return;

  if (firstSlideImg) {
    firstSlideImg.style.display = "none";
  }

  nazarisVideo.style.display = "block";
  nazarisVideo.currentTime = 0;
  nazarisVideo.muted = false;
  nazarisVideo.volume = 1;

  var playPromise = nazarisVideo.play();
  if (playPromise && typeof playPromise.catch === "function") {
    playPromise.catch(function(){});
  }
}

function playBananaVideo() {
  if (!bananaCultVideo || !slides[12]) return;

  if (bananaSlideImg) {
    bananaSlideImg.style.display = "none";
  }

  bananaCultVideo.style.display = "block";
  bananaCultVideo.currentTime = 0;
  bananaCultVideo.muted = false;
  bananaCultVideo.volume = 1;

  var playPromise = bananaCultVideo.play();
  if (playPromise && typeof playPromise.catch === "function") {
    playPromise.catch(function(){});
  }
}

/* MINI SLIDESHOW */
function startMiniSlideshow(slide, img, index) {
  var imgs = projectImagesByIndex[index];

  if (!img || !imgs || imgs.length === 0) return;

  img.src = safeSrc(imgs[0]);

  if (imgs.length > 1) {
    var miniIndex = 0;
    slide.miniInterval = setInterval(function() {
      miniIndex = (miniIndex + 1) % imgs.length;
      img.src = safeSrc(imgs[miniIndex]);
    }, 1200);
  }
}

/* HOVER MODE */
function activateProject(index) {
  if (!slides[index]) return;

  stopAllVideos();
  clearAllMiniSlides();
  currentIndex = index;

  showSlide(index);
  updateBottomHighlight(index);

  isHovering = true;
  targetSpeed = slowSpeed;
  desc.style.opacity = "0";

  var slide = slides[index];
  var img = slide.querySelector("img");

  startMiniSlideshow(slide, img, index);
}

/* LOCK MODE */
function selectProject(index) {
  clearAllMiniSlides();

  isLocked = true;
  lockedIndex = index;
  currentIndex = index;

  showSlide(index);
  updateBottomHighlight(index);
  stopAllVideos();

  var slide = slides[index];
  var img = slide.querySelector("img");

  if (index === 0) {
    if (firstSlideImg) {
      firstSlideImg.style.display = "none";
    }
    playNazarisVideo();
  } else if (index === 12) {
    playBananaVideo();
  } else {
    startMiniSlideshow(slide, img, index);
  }

  desc.innerHTML = descriptions[index];
  desc.style.opacity = "1";
}

/* PROJECT NAME EVENTS */
projectLinks.forEach(function(link) {
  link.addEventListener("mouseenter", function() {
    if (isLocked) return;
    activateProject(parseInt(this.dataset.index, 10));
  });

  link.addEventListener("mouseleave", function() {
    if (isLocked) return;
    clearAllMiniSlides();
    stopAllVideos();
    desc.style.opacity = "0";
    isHovering = false;
    targetSpeed = fastSpeed;
  });

  link.addEventListener("click", function(e) {
    e.preventDefault();
    selectProject(parseInt(this.dataset.index, 10));
  });
});

/* MAIN LOOP */
function slideshowLoop() {
  currentSpeed += (targetSpeed - currentSpeed) * easing;

  if (!isLocked && !isHovering) {
    stopAllVideos();
    showSlide(currentIndex);
    updateBottomHighlight(currentIndex);
    currentIndex = (currentIndex + 1) % slides.length;
  }

  setTimeout(slideshowLoop, currentSpeed);
}

/* INIT */
for (var i = 0; i < slides.length; i++) {
  var img = slides[i].querySelector("img");
  var set = projectImagesByIndex[i];
  if (img && set && set[0]) {
    img.src = safeSrc(set[0]);
  }
}

showSlide(0);
updateBottomHighlight(0);
slideshowLoop();

/* EMOJI RAIN */
var nameElem = document.querySelector(".name");
var snowContainer = document.getElementById("rainbowSnow");
var snowInterval = null;

function createRainbow() {
  var img = document.createElement("img");
  img.src = "rainbow_1f308.png";
  img.className = "rainbow-snow";
  img.style.left = (Math.random() * 100) + "vw";

  var duration = 6 + Math.random() * 6;
  img.style.animationDuration = duration + "s";

  snowContainer.appendChild(img);

  setTimeout(function() {
    img.remove();
  }, duration * 1000);
}

if (nameElem) {
  nameElem.addEventListener("mouseenter", function() {
    if (snowInterval) {
      clearInterval(snowInterval);
    }
    snowInterval = setInterval(createRainbow, 180);
  });

  nameElem.addEventListener("mouseleave", function() {
    if (snowInterval) {
      clearInterval(snowInterval);
      snowInterval = null;
    }
  });
}

/* INTRO (IMAGE ONLY START) */
var urlParams = new URLSearchParams(window.location.search);
var skipIntro = urlParams.get("skipIntro") === "true";
var introActive = true;

if (skipIntro) {
  introActive = false;
  window.history.replaceState({}, document.title, window.location.pathname);
}

if (introActive) {
  document.documentElement.classList.add("intro-active");
  document.body.classList.add("intro-active");

  function endIntro() {
    if (!introActive) return;

    introActive = false;
    document.documentElement.classList.remove("intro-active");
    document.body.classList.remove("intro-active");

    document.removeEventListener("click", endIntro);
  }

  document.addEventListener("click", endIntro);
}
</script>

</body>
</html>
